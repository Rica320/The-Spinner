<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="./assets/index-D9B8KWk-.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CC1T_zxO.css">
  </head>
  <canvas class="webgl"></canvas>
  <body class="min-h-screen flex items-center justify-center">
    <div
      class="panel fixed left-8 top-1/2 -translate-y-1/2 w-72 bg-black border border-white rounded-2xl flex flex-col overflow-hidden shadow-[0_0_60px_rgba(255,255,255,0.08)]"
      style="max-height: 80vh"
    >
      <!-- HEADER -->
      <div
        class="flex items-center justify-between px-5 py-4 border-b border-white/20"
      >
        <h2 class="panel-title text-white text-2xl tracking-widest">PEOPLE</h2>
        <span
          id="countBadge"
          class="text-xs text-black bg-white rounded-full w-6 h-6 flex items-center justify-center font-medium transition-all"
          >0</span
        >
      </div>

      <!-- PEOPLE LIST -->
      <ul
        id="peopleList"
        class="flex-1 overflow-y-auto py-1"
        style="min-height: 0"
      ></ul>

      <!-- EMPTY STATE -->
      <div
        id="emptyState"
        class="flex flex-col items-center justify-center py-8 px-4 text-white/20 text-xs tracking-widest text-center"
      >
        <div
          class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center mb-3 text-lg"
        >
          ∅
        </div>
        NO PEOPLE YET
      </div>

      <!-- ADD FORM -->
      <div class="px-4 py-4 border-t border-white/20 space-y-2">
        <div class="flex gap-2 items-center">
          <div class="relative flex-shrink-0">
            <input
              type="color"
              id="colorInput"
              value="#e63946"
              class="w-8 h-8 rounded-full cursor-pointer border-0 bg-transparent p-0 appearance-none"
              style="
                width: 32px;
                height: 32px;
                border-radius: 50%;
                padding: 0;
                cursor: pointer;
              "
            />
          </div>
          <input
            id="nameInput"
            placeholder="Name"
            class="mono-input flex-1 bg-transparent border border-white/30 rounded-lg px-3 py-2 text-white text-xs placeholder-white/25 focus:border-white transition-colors"
          />
        </div>
        <button
          onclick="addPerson()"
          class="add-btn w-full bg-white text-black rounded-lg py-2 text-xs font-medium tracking-widest hover:bg-white/90"
        >
          + ADD
        </button>
      </div>

      <!-- SPIN & SHARE -->
      <div class="flex w-full">
        <button
          id="spinBtn"
          onclick="toggleSpin()"
          class="flex-1 bg-transparent text-white border border-white/30 rounded-l-lg py-2 text-xs font-medium tracking-widest hover:bg-white/10 transition-colors"
        >
          <span class="flex items-center justify-center gap-2">
            <i class="spin-icon">↻</i>
            <span id="spinLabel">SPIN</span>
          </span>
        </button>
        <div class="w-px bg-white/20"></div>
        <button
          id="shareBtn"
          onclick="shareWheel()"
          class="flex-1 bg-transparent text-white border border-white/30 rounded-r-lg py-2 text-xs font-medium tracking-widest hover:bg-white/10 transition-colors"
        >
          <span class="flex items-center justify-center gap-2">
            <span id="shareLabel">SHARE</span>
            <i class="share-icon">↱</i>
          </span>
        </button>
      </div>
    </div>
    
    <!-- Share notification -->
    <div id="shareNotification" class="hidden fixed top-4 right-4 bg-black border border-white rounded-lg px-4 py-2 text-white text-xs z-50">
      Copied to clipboard!
    </div>

    <!-- MODAL -->
    <div
      id="winnerModal"
      class="hidden fixed inset-0 flex items-center justify-center bg-black/70 backdrop-blur-sm z-50"
    >
      <div
        class="w-80 bg-black border border-white rounded-2xl overflow-hidden shadow-[0_0_60px_rgba(255,255,255,0.08)]"
      >
        <!-- HEADER -->
        <div class="px-5 py-4 border-b border-white/20 text-center">
          <h2 class="panel-title text-white text-2xl tracking-widest">
            THE WINNER IS
          </h2>
        </div>

        <!-- WINNER ITEM -->
        <ul class="py-2">
          <li
            id="winnerItem"
            class="flex items-center justify-between px-4 py-3 border-b border-white/10"
          ></li>
        </ul>

        <!-- CLOSE -->
        <div class="p-4 border-t border-white/20">
          <button
            onclick="closeWinnerModal()"
            class="w-full bg-white text-black rounded-lg py-2 text-xs font-medium tracking-widest hover:bg-white/90"
          >
            CLOSE
          </button>
        </div>
      </div>
    </div>
    <script>
      const STORAGE_KEY = "people-panel-v1";
      const JSONBIN_MASTER_KEY = '$2a$10$G6bR/qRFeR9JHv5kKWdVROgVH7tEmuhsANUz9c9e8yqU.qV5py2c.';
      const JSONBIN_ACCESS_KEY = '$2a$10$7fu7GA354R1OmYmNfpBRaO99WlUDSkSo34oDJ.fAmvfNV0Yqe81K6';
      const urlParams = new URLSearchParams(window.location.search);
      const binId = urlParams.get('bin');
      const COLORS = [
        "#e63946",
        "#f4a261",
        "#2a9d8f",
        "#457b9d",
        "#9b5de5",
        "#f15bb5",
        "#00bbf9",
        "#06d6a0",
        "#ffbe0b",
        "#fb5607",
      ];
      let colorIdx = 0;
      const colorInput = document.getElementById("colorInput");

      // ── Storage helpers ──────────────────────────────────────────────
      function loadPeople() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          return [];
        }
      }

      async function loadPeopleFromBin(binId) {
        try {
          const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
            headers: {
              'X-Master-Key': JSONBIN_MASTER_KEY,
              'X-Access-Key': JSONBIN_ACCESS_KEY
            }
          });
          if (!response.ok) {
            // Bin doesn't exist, create it with empty data
            await fetch(`https://api.jsonbin.io/v3/b`, {
              method: 'POST',
              headers: {
                'X-Master-Key': JSONBIN_MASTER_KEY,
                'X-Access-Key': JSONBIN_ACCESS_KEY,
                'X-Bin-Name': binId,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ people: [] })
            });
            return [];
          }
          const data = await response.json();
          return data.record?.people || [];
        } catch (e) {
          console.error('Failed to load from JSONBin:', e);
          return [];
        }
      }

      async function savePeopleToBin(binId, people) {
        try {
          const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
            method: 'PUT',
            headers: {
              'X-Master-Key': JSONBIN_MASTER_KEY,
              'X-Access-Key': JSONBIN_ACCESS_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ people })
          });
          if (!response.ok) {
            // If bin doesn't exist, create it
            await fetch(`https://api.jsonbin.io/v3/b`, {
              method: 'POST',
              headers: {
                'X-Master-Key': JSONBIN_MASTER_KEY,
                'X-Access-Key': JSONBIN_ACCESS_KEY,
                'X-Bin-Name': binId,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ people })
            });
          }
        } catch (e) {
          console.error('Failed to save to JSONBin:', e);
        }
      }

      async function shareWheel() {
        // Get current people data
        const items = [...document.querySelectorAll(".person-item")].map(
          (li) => ({
            id: li.dataset.id,
            name: li.dataset.name,
            color: li.dataset.color,
            frequency: li.dataset.frequency,
          }),
        );
        
        // Generate random bin name
        const randomBinName = 'wheel-' + Math.random().toString(36).substring(2, 12);
        
        try {
          // Create new bin
          const response = await fetch(`https://api.jsonbin.io/v3/b`, {
            method: 'POST',
            headers: {
              'X-Master-Key': JSONBIN_MASTER_KEY,
              'X-Access-Key': JSONBIN_ACCESS_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ people: items })
          });
          
          const data = await response.json();
          const binId = data.metadata.id;
          
          // Construct share URL
          const shareUrl = window.location.origin + window.location.pathname + '?bin=' + binId;
          
          // Copy to clipboard
          await navigator.clipboard.writeText(shareUrl);
          
          // Show notification
          const notification = document.getElementById('shareNotification');
          notification.classList.remove('hidden');
          setTimeout(() => notification.classList.add('hidden'), 2000);
          
        } catch (e) {
          console.error('Failed to create shareable link:', e);
          alert('Failed to create shareable link. Check console for details.');
        }
      }

      function closeWinnerModal() {
        document.getElementById("winnerModal").classList.add("hidden");
      }

      function savePeople() {
        const items = [...document.querySelectorAll(".person-item")].map(
          (li) => ({
            id: li.dataset.id,
            name: li.dataset.name,
            color: li.dataset.color,
            frequency: li.dataset.frequency,
          }),
        );
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        
        // Save to JSONBin if a bin ID is present (fire and forget)
        if (binId) {
          savePeopleToBin(binId, items).catch(e => console.error('Save failed:', e));
        }
      }

      // ── Render a single person li ────────────────────────────────────
      function renderPerson({ id, name, color, frequency }, animate = true) {
        const li = document.createElement("li");
        li.className =
          "person-item flex items-center justify-between px-4 py-3 border-b border-white/10 last:border-0 group";
        if (!animate) li.style.animation = "none";
        li.dataset.id = id;
        li.dataset.name = name;
        li.dataset.color = color;
        li.dataset.frequency = frequency;

        const initials = name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();

        li.innerHTML = `
    <div class="flex items-center gap-3">
      <div class="color-dot w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 text-black"
           style="background:${color};">${initials}</div>
      <span class="text-white text-xs tracking-wide truncate max-w-[140px]">${name}</span>
    </div>
    <div id=${"stsList" + id} class="flex items-center gap-2 ml-auto">
      ${frequency && frequency > 0 ? `<div id='${id}' class="text-xs text-black bg-white rounded-full w-6 h-6 flex items-center justify-center font-medium transition-all">${frequency}</div>` : ""}
      <button class="remove-btn text-white/25 hover:text-white text-base leading-none group-hover:text-white/50" title="Remove">✕</button>
    </div>
  `;

        // Toggle not-available class when clicking the li (except remove button)
        li.addEventListener("click", (e) => {
          if (!e.target.classList.contains("remove-btn")) {
            li.classList.toggle("not-available");

            if (li.classList.contains("not-available")) {
              console.log("kdkdkdkd");
              document.dispatchEvent(
                new CustomEvent("personNotAvailable", {
                  detail: { id: li.dataset.id },
                }),
              );
            } else {
              document.dispatchEvent(
                new CustomEvent("personAvailable", {
                  detail: { id: li.dataset.id },
                }),
              );
            }
          }
        });

        //  Remove person
        li.querySelector(".remove-btn").onclick = () => {
          li.classList.add("removing");
          setTimeout(() => {
            li.remove();
            updateCount();
            savePeople();
            // 🔔 trigger event
            document.dispatchEvent(
              new CustomEvent("personRemoved", {
                detail: { id: li.dataset.id },
              }),
            );
          }, 200);
        };

        document.getElementById("peopleList").appendChild(li);
      }

      // ── UI state ─────────────────────────────────────────────────────
      function updateCount() {
        const n = document.querySelectorAll(".person-item").length;
        document.getElementById("countBadge").textContent = n;
        document.getElementById("emptyState").style.display =
          n === 0 ? "flex" : "none";
      }

      // ── Add person ───────────────────────────────────────────────────
      function addPerson() {
        const name = document.getElementById("nameInput").value.trim();
        if (!name) {
          const inp = document.getElementById("nameInput");
          inp.focus();
          inp.style.borderColor = "#fff";
          setTimeout(() => (inp.style.borderColor = ""), 600);
          return;
        }

        const color = colorInput.value;
        const id =
          Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

        const person = { id, name, color, frequency: 0 };

        renderPerson(person, true);

        document.getElementById("nameInput").value = "";
        colorIdx++;
        colorInput.value = COLORS[colorIdx % COLORS.length];

        updateCount();
        savePeople();

        // 🔔 trigger event
        document.dispatchEvent(
          new CustomEvent("personAdded", { detail: person }),
        );

        document.getElementById("nameInput").focus();
      }

      // ── Init ─────────────────────────────────────────────────────────
      colorInput.value = COLORS[colorIdx % COLORS.length];

      // Load initial data
      async function init() {
        let initialPeople = [];
        if (binId) {
          initialPeople = await loadPeopleFromBin(binId);
        } else {
          initialPeople = loadPeople();
        }
        initialPeople.forEach((p) => renderPerson(p, false));
        updateCount();
      }
      init();

      document.getElementById("nameInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") addPerson();
      });
    </script>
  </body>
</html>
